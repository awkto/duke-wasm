# Reverse-proxy vhost for duke-wasm — install on the host (box or pro) at
#   /etc/nginx/sites-enabled/duke.<host>.dnsif.ca  (or /etc/nginx/conf.d/duke.conf)
# then `nginx -t && systemctl reload nginx`.
#
# Set server_name + cert paths for the host:
#   - on pro:  server_name duke.pro.dnsif.ca;  cert /etc/nginx/ssl/pro.dnsif.ca.{crt,key}
#   - on box:  server_name duke.box.dnsif.ca;  cert /etc/nginx/ssl/box.dnsif.ca.fullchain.crt + .key
# Both are covered by the host's *.<host>.dnsif.ca wildcard cert + wildcard DNS.

server {
    listen 80;
    server_name duke.pro.dnsif.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name duke.pro.dnsif.ca;

    ssl_certificate     /etc/nginx/ssl/pro.dnsif.ca.crt;
    ssl_certificate_key /etc/nginx/ssl/pro.dnsif.ca.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:5028;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
